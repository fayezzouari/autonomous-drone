# ── Drone physical parameters ──────────────────────────────────────────────────
# Mirror the constants in blender-navigatio.py. Change them here ONLY if you also
# change them in the sim, so the controller's thrust model stays valid.
drone:
  mass: 0.42           # kg  (measured real airframe)
  gravity: 9.81        # m/s^2
  thrust_max: 15.0     # N at full prop speed
  prop_max_speed: 720.0  # deg/s
  max_vane_deg: 28.0   # max vane deflection
  rho_air: 1.225
  rotor_radius: 0.75

# ── Altitude control ────────────────────────────────────────────────────────────
# The controller holds this altitude via a PID on throttle. Steering is manual:
# the four vane angles are supplied raw on the vane-input topic below.
control:
  target_altitude: 2.0   # m   altitude to hold
  pos_z_p: 1.5           # 1/s altitude error -> climb-rate setpoint
  vz_max: 2.5            # m/s climb/descent cap
  loop_rate_hz: 50.0     # controller update rate

  vel_z:                 # climb-rate -> vertical acceleration PID
    kp: 4.0
    ki: 2.0
    kd: 0.2
    out_min: -8.0
    out_max: 8.0
    i_limit: 6.0

# ── Autonomous A → B control (--goto / --mission) ────────────────────────────────
goto:
  pos_xy_p: 1.2          # 1/s horizontal position -> velocity
  pos_z_p: 1.5           # 1/s altitude  position -> velocity
  v_max_xy: 4.0          # m/s horizontal speed cap
  vz_max: 2.5            # m/s climb/descent cap
  target_yaw: 0.0        # heading (rad) held while travelling
  vel_xy:                # horizontal velocity -> acceleration PID
    kp: 3.0
    ki: 0.8
    kd: 0.15
    out_min: -6.0
    out_max: 6.0
    i_limit: 4.0
  vel_z:                 # vertical velocity -> acceleration PID
    kp: 4.0
    ki: 2.0
    kd: 0.2
    out_min: -8.0
    out_max: 8.0
    i_limit: 6.0
  yaw:                   # heading error -> yaw vane deflection PID
    kp: 1.5
    ki: 0.0
    kd: 0.1
    out_min: -0.384      # ±22°
    out_max: 0.384

# ── Waypoint mission (used by --mission) ──────────────────────────────────────────
# A -> B, far apart and at different altitudes.
mission:
  waypoints:
    - [0.0, 0.0, 3.0]      # A  — climb off the ground to 3 m
    - [12.0, 0.0, 7.0]     #    — fly out +X while climbing to 7 m
    - [12.0, 12.0, 4.0]    #    — turn +Y and descend to 4 m
    - [-4.0, 8.0, 9.0]     # B  — cross back and climb to 9 m
  arrival_radius: 0.5      # m
  arrival_speed: 0.4       # m/s
  hold_time: 1.0           # s sustained inside the arrival window
  loop: false

# ── Obstacle-avoiding path planner (used by --goto/--mission with --avoid) ─────────
# The drone is not a point: every obstacle box is grown by (drone_radius +
# safety_margin) before planning, so the flown path keeps that much clearance.
# Obstacles arrive (on `drone/obs`, or here for --sim) as a list of boxes given
# by centre + HALF-extents:
#   {cx, cy, cz, hw: <half-width>, hd: <half-depth>, hh: <half-height>}  (optional yaw, rad)
# (the older {c:[x,y,z], w, h, t} full-extent shape is still accepted). They map
# into the nav world frame by:
#   • obstacle_axes: which extent (w/t=d/h) becomes the X,Y,Z half-extent
#     (default wdh → X=width(hw), Y=depth(hd), Z=height(hh) — matches the
#     Blender publisher, which builds box verts as (±hw, ±hd, ±hh))
#   • obstacle_flip: centre axes negated to undo a frame sign convention
#     ('' = none; the current export is already world-frame)
planner:
  drone_radius: 0.5       # m   matches the Blender sim's DRONE_RADIUS sphere collider
  safety_margin: 0.30      # m   extra clearance to absorb controller overshoot at speed
  resolution: 0.5          # m   A* lattice cell size
  z_min: 0              # m   don't plan cruise below this altitude
  z_max: 12.0              # m   …or above this one
  bounds_pad: 3.0          # m   expand the search box this far around A and B
  max_nodes: 2000000        #     search expansion cap (fails over to hover if hit)
  algorithm: theta         #     'theta' (any-angle, default) or 'astar' (grid + shortcut)
  obstacle_axes: wdh       #     which extent maps to X,Y,Z (hw→X, hd→Y, hh→Z — matches the Blender publisher)
  obstacle_flip: ''        #     centre axes to negate (source→world); '' for none (publisher is world-frame)
  obstacle_wait: 3.0       # s   at startup, wait this long for the first drone/obs before planning
  cruise_speed: 7.0        # m/s horizontal speed cap while avoiding (slower = tighter line tracking; 0 = use goto v_max_xy)
  climb_speed: 0.5         # m/s vertical speed cap while avoiding (gentler launch/descent; 0 = use goto vz_max)
  climb_floor: 0.25        # m/s min climb kept when coupling climb to forward progress (anti shoot-straight-up)
  follow_spacing: 0.8      # m   re-sample the planned path to this spacing so the drone hugs the line
  preview_pause: 3.0       # s   after the first plan, hold and publish drone/path this long before flying (0 = off)

# Static obstacles for OFFLINE demos/tests (`--sim --avoid`), same shape as the
# live `drone/obs` boxes. Live runs ignore these and use the topic instead.
# With axes=wdh this slab lands at world x∈[5,7] (hw=1), y∈[2,8] (hd=3),
# z∈[0,8] (hh=4), straddling the A→B route:
obstacles:
  - { cx: 6.0, cy: 5.0, cz: 4.0, hw: 1.0, hd: 3.0, hh: 4.0 }   # tall slab across the route

# ── Manual gamepad (drone-teleop) control ────────────────────────────────────────
# Maps PS4 sticks -> vanes + throttle. Right stick = pitch/roll, left stick X = yaw,
# left stick Y = throttle (or climb rate with altitude-hold on).
manual:
  deadzone: 0.08         # stick deadzone (fraction)
  expo: 0.30             # 0 linear .. 1 softer around centre
  throttle_rate: 0.2     # throttle units/s while Triangle(up)/Cross(down) held
  tilt_frac: 1.0         # fraction of max vane deflection a full stick commands
  yaw_rate_max: 1.2      # rad/s at full yaw stick
  yaw_swirl_frac: 0.6    # fraction of max vane deflection used for yaw swirl
  climb_rate_max: 2.0    # m/s at full throttle stick (altitude-hold mode)
  altitude_hold_default: false
  # Feedforward anti-torque swirl (rad) that cancels the prop's reaction torque
  # so the airframe doesn't spin up. Ramped in with throttle. BENCH-TUNE on hw:
  # increase until a hovering drone holds heading hands-off; flip the sign if it
  # spins the wrong way. 0 disables (falls back to the heading-hold PID alone).
  yaw_antitorque: 0.008
  yaw:                   # heading-hold: kp on error, ki = anti-torque trim,
    kp: 1.5              # kd damps the measured yaw rate (gz)
    ki: 0.4              # integral trim — nulls residual spin the FF misses
    kd: 0.1
    i_limit: 0.2         # cap trim swirl (rad), within the ±max_swirl budget
    out_min: -0.384      # ±22°
    out_max: 0.384

# ── Servo / ESC output mapping (PC -> ESP32) ──────────────────────────────────────
# Vane deflection (rad, neutral 0) -> logical servo angle (deg). 90 = neutral; the
# angle is hard-clamped to the [40, 160] rotation limit. The ESP32 then applies its
# own per-pin trim on top. gain_deg_per_rad: leave blank to auto-fit to the limit.
servo:
  neutral_deg: 90.0
  min_deg: 40.0          # vane rotation limit (min)
  max_deg: 160.0         # vane rotation limit (max)
  # gain_deg_per_rad: 100.0
  esc_min_throttle: 0.0  # ESC idle floor sent at zero stick
  # Vanes 3 & 4 face opposite their pair-mate (v1, v2), so flip them: combined
  # with the pair-together mixing this gives s3 = 180 - s1 and s4 = 180 - s2
  # (e.g. s1=120 -> s3=60) for every input. Order [v1, v2, v3, v4].
  reverse: [false, false, true, true]

# ── MQTT transport ──────────────────────────────────────────────────────────────
mqtt:
  host: 10.68.88.93    # broker (mosquitto) location — same LAN IP the ESP32 uses
  port: 1883
  # username: myuser
  # password: mypass
  client_id: drone-nav
  keepalive: 30
  topic_telemetry: drone/telemetry   # sim -> nav
  topic_command: drone/cmd           # nav -> sim  (throttle + 4 vane angles, rad)
  topic_vane_input: drone/vanes      # external -> nav (raw vane angles)
  topic_status: drone/status         # nav -> world
  topic_imu: drone/imu               # ESP32 IMU -> nav (orientation)
  topic_hw_cmd: drone/hw             # nav -> ESP32 (servo degrees + ESC)
  topic_obstacles: drone/obs         # sim -> nav (obstacle box list)
  topic_path: drone/path             # nav -> world (planned waypoints)
  topic_goto: drone/goto             # world -> nav (live A->B target, e.g. [x,y,z])
