; ESP32-S3-DevKitC-1 (N8R2: 8 MB flash, 2 MB *quad* PSRAM).
;
; NOTE on pins: the servo pins 36/37/38/39 are free on the N8R2 because its 2 MB
; PSRAM is quad-SPI (internal bus). On octal-PSRAM boards (…R8) GPIO35/36/37 are
; reserved for the PSRAM — do NOT use those pins there.
;
; Build / flash:
;   pio run -t upload          (or use the PlatformIO IDE button)
;   pio device monitor         (115200 baud)
;
; Set your Wi-Fi + broker in include/secrets.h (copy from secrets.example.h).

[env:esp32s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600

build_flags =
    -D BOARD_HAS_PSRAM
    ; Route Serial to the built-in USB-Serial-JTAG (same interface the ROM uses),
    ; so the monitor port does NOT re-enumerate when the sketch boots.
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1

lib_deps =
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^7.0
    rfetick/MPU6050_light@^1.1.0
